<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te Amo Bonita</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        /* Restablecimiento básico */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Estilos del cuerpo con centrado perfecto y un degradado suave */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%); /* Degradado rosa/púrpura suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        /* Contenedor principal */
        .love-container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        /* Estilos del texto central "TE AMO" */
        .love-text {
            /* Usando la fuente de Google */
            font-family: 'Great Vibes', cursive;
            
            /* Tamaño extremadamente grande que se escala con la pantalla (vw = width viewport) */
            font-size: 15vw; 
            
            /* Color suave off-white */
            color: #fff;
            
            /* Efecto de resplandor para que se vea más 'bonito' y etéreo */
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4),
                0 0 40px rgba(255, 100, 100, 0.3); /* Un toque de rosa en el resplandor */
            
            /* Asegura que la caligrafía sea fluida */
            line-height: 1.1; 
            margin: 0;
            padding: 20px 0;
            
            /* Pequeña animación de entrada suave */
            opacity: 0;
            animation: fadeInScale 2s ease forwards;
        }

        /* Animación para el texto */
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Ajustes para pantallas móviles (para que el texto no sea DEMASIADO grande) */
        @media (max-width: 600px) {
            .love-text {
                font-size: 25vw; /* Aún grande, pero más manejable */
            }
        }
    </style>
</head>
<body>

    <div class="love-container">
        <h1 class="love-text">TE AMO</h1>
    </div>

</body>
</html>
