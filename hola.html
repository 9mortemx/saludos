<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería del Amor Galáctico</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --secondary-purple: #a18cd1;
            --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        header {
            margin: 40px 0;
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
        }

        /* Estilo de Tarjetas */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            overflow: hidden;
            width: 320px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 1s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover; /* Ajusta la imagen sin deformarla */
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-content {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Corazones flotantes decorativos */
        .heart {
            position: fixed;
            color: white;
            font-size: 20px;
            z-index: -1;
            animation: float 6s linear infinite;
            opacity: 0.5;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: white;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Momentos Inolvidables ✨</h1>
        <p style="color: white;">Una colección de arte y sentimientos profundos</p>
    </header>

    <div class="container">
        <div class="card">
            <img src="1000370118.jpg" alt="Amor Grande">
            <div class="card-content">
                <div class="card-title">Amor de Talla Mundial</div>
            </div>
        </div>

        <div class="card">
            <img src="1000370119.jpg" alt="Shrek y Minion">
            <div class="card-content">
                <div class="card-title">Crossover Inesperado</div>
            </div>
        </div>

        <div class="card">
            <img src="1000370120.jpg" alt="Pixel Love">
            <div class="card-content">
                <div class="card-title">Pasión en Píxeles</div>
            </div>
        </div>
    </div>

    <footer>
        Hecho con ❤️ y un poco de caos
    </footer>

    <script>
        // Generador de corazoncitos de fondo
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 500);
    </script>
</body>
</html>
